###################################################################################
# For additional configurable services, features, and property descriptions,      #
# please review our network configuration reference in our README.md:             #
# https://github.com/awslabs/landing-zone-accelerator-on-aws/blob/main/README.md  #
###################################################################################
homeRegion: &HOME_REGION ap-southeast-1
#####################################
# Delete default VPCs-- use this    #
# object to delete default VPCs in  #
# any non-excluded accounts         #
#####################################
defaultVpc:
  delete: true
  excludeAccounts: []

#####################################
# Transit Gateways-- use this object #
# to deploy transit gateways         #
#####################################
transitGateways:
  - name: Network-Main
    account: Network
    region: *HOME_REGION
    shareTargets:
      organizationalUnits:
        - Infrastructure
    asn: 65521
    dnsSupport: enable
    vpnEcmpSupport: enable
    defaultRouteTableAssociation: disable
    defaultRouteTablePropagation: disable
    autoAcceptSharingAttachments: enable
    routeTables:
      - name: Network-Main-Core
        routes: []
      - name: Network-Main-Spoke
        routes:
          - destinationCidrBlock: 0.0.0.0/0
            attachment:
              vpcName: Network-Inspection
              account: Network

centralNetworkServices:
  delegatedAdminAccount: Network

  networkFirewall:
    firewalls:
      - name: accelerator-firewall
        firewallPolicy: accelerator-strict-policy
        subnets:
          - Network-Inspection-A
          - Network-Inspection-B
        vpc: Network-Inspection
        loggingConfiguration:
          # - destination: s3
          - destination: cloud-watch-logs
            type: ALERT
          - destination: cloud-watch-logs
            type: FLOW
    policies:
      # - name: accelerator-policy
      #   regions:
      #     - *HOME_REGION
      #   firewallPolicy:
      #   # Prefer statefull rules, see https://aws.github.io/aws-security-services-best-practices/guides/network-firewall/#use-stateful-rules-over-stateless-rules
      #     statelessDefaultActions: ["aws:forward_to_sfe"]
      #     statelessFragmentDefaultActions: ["aws:forward_to_sfe"]
      #     statefulRuleGroups:
      #       - name: accelerator-rule-group
      #       - name: domain-list-group
      #   shareTargets:
      #     organizationalUnits:
      #       - Infrastructure
      - name: accelerator-strict-policy
        regions:
          - *HOME_REGION
        firewallPolicy:
        # Prefer statefull rules, see https://aws.github.io/aws-security-services-best-practices/guides/network-firewall/#use-stateful-rules-over-stateless-rules     
        # Note: AWS managed threat signatures cannot be added via LZA config   
          statelessDefaultActions: ["aws:forward_to_sfe"]
          statelessFragmentDefaultActions: ["aws:forward_to_sfe"]
          statefulEngineOptions: STRICT_ORDER
          statefulDefaultActions:
            - "aws:drop_established"
            - "aws:alert_established"
          statefulRuleGroups:
            # Custom Suricata rules
            - name: accelerator-strict-rule-group
              priority: 101
        shareTargets:
          organizationalUnits:
            - Infrastructure
            - Workloads
    rules:
      # - name: accelerator-rule-group
      #   regions:
      #     - *HOME_REGION
      #   capacity: 100
      #   type: STATEFUL
      #   ruleGroup:
      #     rulesSource:
      #       statefulRules:
      #         # Block traffic between production VPCs
      #         - action: DROP
      #           header:
      #             destination: 10.4.0.0/22
      #             destinationPort: ANY
      #             direction: ANY
      #             protocol: IP
      #             source: 10.5.0.0/22
      #             sourcePort: ANY
      #           ruleOptions:
      #             - keyword: sid
      #               settings: ["100"]

      #         - action: ALERT
      #           header:
      #             destination: 8.8.8.8/32
      #             destinationPort: ANY
      #             direction: FORWARD
      #             protocol: TCP
      #             source: ANY
      #             sourcePort: ANY
      #           ruleOptions:
      #             - keyword: msg
      #               settings: ['"example message"']
      #             - keyword: sid
      #               settings: ["102"]
      - name: domain-list-group
        regions:
          - *HOME_REGION
        capacity: 10
        type: STATEFUL
        ruleGroup:
          rulesSource:
            rulesSourceList:
              generatedRulesType: ALLOWLIST
              # Add/Modify the domain list per business needs.
              targets: [".amazonaws.com", ".amazon.com", ".github.com"]
              targetTypes: ["TLS_SNI", "HTTP_HOST"]
          ruleVariables:
            ipSets:
              name: HOME_NET
              definition:
                - 10.1.0.0/22
                - 10.2.0.0/22
                - 10.3.0.0/22
                - 10.4.0.0/22
                - 10.5.0.0/22
            portSets:
              name: HOME_NET_PORTS
              definition:
                - "80"
                - "443"
      - name: accelerator-strict-rule-group
        regions:
          - *HOME_REGION
        capacity: 100
        type: STATEFUL
        ruleGroup:
          statefulRuleOptions: STRICT_ORDER
          rulesSource:
            rulesFile: firewall-rules/rules.txt
          ruleVariables:
            ipSets:
              name: HOME_NET
              definition:
                - 10.1.0.0/22
                - 10.2.0.0/22
                - 10.3.0.0/22
                - 10.4.0.0/22
                - 10.5.0.0/22
            portSets:
              name: HOME_NET_PORTS
              definition:
                - "80"
                - "443"

  #####################################
  # Route53 DNS Resolver Firewall -- use this     #
  # object to define settings for DNS #
  # Resolver Firewall                  #
  #####################################
  route53Resolver:
    endpoints: []
    queryLogs:
      name: accelerator-query-logs
      destinations:
        - s3
        - cloud-watch-logs
      shareTargets:
        organizationalUnits:
          - Infrastructure
          - Security
          - Workloads

    firewallRuleGroups:
      - name: accelerator-block-group
        regions:
          - *HOME_REGION
        rules:
          - name: nxdomain-block-rule
            action: BLOCK
            customDomainList: dns-firewall-domain-lists/domain-list-1.txt
            priority: 100
            blockResponse: NXDOMAIN
          - name: override-block-rule
            action: BLOCK
            customDomainList: dns-firewall-domain-lists/domain-list-2.txt
            priority: 200
            blockResponse: OVERRIDE
            blockOverrideDomain: amazon.com
            blockOverrideTtl: 3600
          - name: managed-rule
            action: BLOCK
            managedDomainList: AWSManagedDomainsBotnetCommandandControl
            priority: 300
            blockResponse: NODATA
        shareTargets:
          organizationalUnits:
            - Infrastructure
            - Security
            - Workloads

#####################################
# Endpoint policies -- use this     #
# object to define standard policies #
# for VPC endpoints                 #
#####################################
endpointPolicies:
  - name: Default
    document: vpc-endpoint-policies/default.json
  - name: Ec2
    document: vpc-endpoint-policies/ec2.json

#####################################
# VPCs-- use this object to deploy  #
# a VPC in a single account and     #
# region.                           #
#####################################
vpcs:
  - name: Network-Endpoints
    account: Network
    region: *HOME_REGION
    defaultSecurityGroupRulesDeletion: true
    cidrs:
      - 10.1.0.0/22
    internetGateway: false
    enableDnsHostnames: true
    enableDnsSupport: true
    instanceTenancy: default
    routeTables:
      - name: Network-Endpoints-Tgw-A
        routes: []
      - name: Network-Endpoints-Tgw-B
        routes: []
      - name: Network-Endpoints-A
        routes:
          - name: TgwRoute
            destination: 0.0.0.0/0
            type: transitGateway
            target: Network-Main
          - name: S3Gateway
            type: gatewayEndpoint
            target: s3
          - name: DynamoDBGateway
            type: gatewayEndpoint
            target: dynamodb
      - name: Network-Endpoints-B
        routes:
          - name: TgwRoute
            destination: 0.0.0.0/0
            type: transitGateway
            target: Network-Main
          - name: S3Gateway
            type: gatewayEndpoint
            target: s3
          - name: DynamoDBGateway
            type: gatewayEndpoint
            target: dynamodb
    subnets:
      - name: Network-Endpoints-A
        availabilityZone: a
        routeTable: Network-Endpoints-A
        ipv4CidrBlock: 10.1.0.0/24
      - name: Network-Endpoints-B
        availabilityZone: b
        routeTable: Network-Endpoints-B
        ipv4CidrBlock: 10.1.1.0/24
      - name: Network-EndpointsTgwAttach-A
        availabilityZone: a
        routeTable: Network-Endpoints-Tgw-A
        ipv4CidrBlock: 10.1.3.208/28
      - name: Network-EndpointsTgwAttach-B
        availabilityZone: b
        routeTable: Network-Endpoints-Tgw-B
        ipv4CidrBlock: 10.1.3.224/28
    transitGatewayAttachments:
      - name: Network-Endpoints
        transitGateway:
          name: Network-Main
          account: Network
        routeTableAssociations:
          - Network-Main-Core
        routeTablePropagations:
          - Network-Main-Spoke
          - Network-Main-Core
        subnets:
          - Network-EndpointsTgwAttach-A
          - Network-EndpointsTgwAttach-B
    gatewayEndpoints:
      defaultPolicy: Default
      endpoints:
        - service: s3
        - service: dynamodb
    interfaceEndpoints:
      central: true
      defaultPolicy: Default
      subnets:
        - Network-Endpoints-A
        - Network-Endpoints-B
      endpoints:
        - service: ec2
        - service: ec2messages
        - service: ssm
        - service: ssmmessages
        - service: kms
        - service: logs
        - service: secretsmanager
        - service: guardduty-data
        - service: ecr
    queryLogs:
      - accelerator-query-logs
    dnsFirewallRuleGroups:
      - name: accelerator-block-group
        priority: 101
  - name: Network-Inspection
    account: Network
    region: *HOME_REGION
    defaultSecurityGroupRulesDeletion: true
    cidrs:
      - 10.2.0.0/22
    internetGateway: true
    enableDnsHostnames: true
    enableDnsSupport: true
    instanceTenancy: default
    useCentralEndpoints: true
    natGateways:
      - name: Nat-Network-Inspection-A
        subnet: Network-Inspection-Pub-A
      - name: Nat-Network-Inspection-B
        subnet: Network-Inspection-Pub-B
    routeTables:
      - name: Network-InspectionTgwAttach-A
        routes:
          - name: NfwRoute
            destination: 0.0.0.0/0
            type: networkFirewall
            target: accelerator-firewall
            targetAvailabilityZone: a
      - name: Network-InspectionTgwAttach-B
        routes:
          - name: NfwRoute
            destination: 0.0.0.0/0
            type: networkFirewall
            target: accelerator-firewall
            targetAvailabilityZone: b
      - name: Network-Inspection-A
        routes:
          - name: NatRoute
            destination: 0.0.0.0/0
            type: natGateway
            target: Nat-Network-Inspection-A
          - name: TgwRoute
            destination: 10.0.0.0/8
            type: transitGateway
            target: Network-Main
          - name: S3Gateway
            type: gatewayEndpoint
            target: s3
          - name: DynamoDBGateway
            type: gatewayEndpoint
            target: dynamodb
      - name: Network-Inspection-B
        routes:
          - name: NatRoute
            destination: 0.0.0.0/0
            type: natGateway
            target: Nat-Network-Inspection-B
          - name: TgwRoute
            destination: 10.0.0.0/8
            type: transitGateway
            target: Network-Main
          - name: S3Gateway
            type: gatewayEndpoint
            target: s3
          - name: DynamoDBGateway
            type: gatewayEndpoint
            target: dynamodb
      - name: Network-Inspection-Pub-A
        routes:
          - name: NfwRoute
            destination: 10.0.0.0/8
            type: networkFirewall
            target: accelerator-firewall
            targetAvailabilityZone: a
          - name: IgwRoute
            destination: 0.0.0.0/0
            type: internetGateway
            target: IGW
      - name: Network-Inspection-Pub-B
        routes:
          - name: NfwRoute
            destination: 10.0.0.0/8
            type: networkFirewall
            target: accelerator-firewall
            targetAvailabilityZone: b
          - name: IgwRoute
            destination: 0.0.0.0/0
            type: internetGateway
            target: IGW
    subnets:
      - name: Network-Inspection-A
        availabilityZone: a
        routeTable: Network-Inspection-A
        ipv4CidrBlock: 10.2.0.0/24
      - name: Network-Inspection-B
        availabilityZone: b
        routeTable: Network-Inspection-B
        ipv4CidrBlock: 10.2.1.0/24
      - name: Network-InspectionTgwAttach-A
        availabilityZone: a
        routeTable: Network-InspectionTgwAttach-A
        ipv4CidrBlock: 10.2.3.208/28
      - name: Network-InspectionTgwAttach-B
        availabilityZone: b
        routeTable: Network-InspectionTgwAttach-B
        ipv4CidrBlock: 10.2.3.224/28
      - name: Network-Inspection-Pub-A
        availabilityZone: a
        routeTable: Network-Inspection-Pub-A
        ipv4CidrBlock: 10.2.3.176/28
      - name: Network-Inspection-Pub-B
        availabilityZone: b
        routeTable: Network-Inspection-Pub-B
        ipv4CidrBlock: 10.2.3.192/28
    transitGatewayAttachments:
      - name: Network-Inspection
        transitGateway:
          name: Network-Main
          account: Network
        options:
          applianceModeSupport: enable
        routeTableAssociations:
          - Network-Main-Core
        routeTablePropagations: []
        subnets:
          - Network-InspectionTgwAttach-A
          - Network-InspectionTgwAttach-B
    queryLogs:
      - accelerator-query-logs
    gatewayEndpoints:
      defaultPolicy: Default
      endpoints:
        - service: s3
        - service: dynamodb
  - name: SharedServices-Main
    account: SharedServices
    region: *HOME_REGION
    defaultSecurityGroupRulesDeletion: true
    cidrs:
      - 10.3.0.0/22
    enableDnsHostnames: true
    enableDnsSupport: true
    instanceTenancy: default
    useCentralEndpoints: true
    gatewayEndpoints:
      defaultPolicy: Default
      endpoints:
        - service: s3
        - service: dynamodb
    queryLogs:
      - accelerator-query-logs
    dnsFirewallRuleGroups:
      - name: accelerator-block-group
        priority: 101
    routeTables:
      - name: SharedServices-Tgw-A
        routes: []
      - name: SharedServices-Tgw-B
        routes: []
      - name: SharedServices-App-A
        routes:
          - name: TgwRoute
            destination: 0.0.0.0/0
            type: transitGateway
            target: Network-Main
          - name: S3Gateway
            type: gatewayEndpoint
            target: s3
          - name: DynamoDBGateway
            type: gatewayEndpoint
            target: dynamodb
      - name: SharedServices-App-B
        routes:
          - name: TgwRoute
            destination: 0.0.0.0/0
            type: transitGateway
            target: Network-Main
          - name: S3Gateway
            type: gatewayEndpoint
            target: s3
          - name: DynamoDBGateway
            type: gatewayEndpoint
            target: dynamodb
    subnets:
      - name: SharedServices-App-A
        availabilityZone: a
        routeTable: SharedServices-App-A
        ipv4CidrBlock: 10.3.0.0/24
      - name: SharedServices-App-B
        availabilityZone: b
        routeTable: SharedServices-App-B
        ipv4CidrBlock: 10.3.1.0/24
      - name: SharedServices-MainTgwAttach-A
        availabilityZone: a
        routeTable: SharedServices-Tgw-A
        ipv4CidrBlock: 10.3.3.208/28
      - name: SharedServices-MainTgwAttach-B
        availabilityZone: b
        routeTable: SharedServices-Tgw-B
        ipv4CidrBlock: 10.3.3.224/28
    transitGatewayAttachments:
      - name: SharedServices-Main
        transitGateway:
          name: Network-Main
          account: Network
        routeTableAssociations:
          - Network-Main-Spoke
        routeTablePropagations:
          - Network-Main-Core
        subnets:
          - SharedServices-MainTgwAttach-A
          - SharedServices-MainTgwAttach-B

##############################################################
# Global configuration for VPC flow logs                     #
# Where there is no flow log configuration defined with VPC  #
# this configuration will be used for flow log configuration #
##############################################################
vpcFlowLogs:
  trafficType: ALL
  maxAggregationInterval: 600
  destinations:
    - cloud-watch-logs
  destinationsConfig:
    cloudWatchLogs:
      retentionInDays: 30
  defaultFormat: false
  customFields:
    - version
    - account-id
    - interface-id
    - srcaddr
    - dstaddr
    - srcport
    - dstport
    - protocol
    - packets
    - bytes
    - start
    - end
    - action
    - log-status
    - vpc-id
    - subnet-id
    - instance-id
    - tcp-flags
    - type
    - pkt-srcaddr
    - pkt-dstaddr
    - region
    - az-id
    - pkt-src-aws-service
    - pkt-dst-aws-service
    - flow-direction
    - traffic-path
