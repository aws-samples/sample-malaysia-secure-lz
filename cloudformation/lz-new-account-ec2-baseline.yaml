AWSTemplateFormatVersion: "2010-09-09"
Description: "Set EC2 Default EBS Encryption, configure IMDSv2 as mandatory and set EBS Snapshots as Block Public Access"

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Lambda Function Configuration"
        Parameters:
          - LoggingLevel
      - Label:
          default: "EC2 Data Protection and Security Configuration"
        Parameters:
          - EbsDefaultEncryption
          - EbsDefaultEncryptionKeyAliasName
          - EC2IMDSv2Mandatory
    ParameterLabels:
      EbsDefaultEncryption:
        default: "EC2 EBS Default Encryption"
      EbsDefaultEncryptionKeyAliasName:
        default: "EC2 EBS Default Encryption Key Alias"
      EC2IMDSv2Mandatory:
        default: "EC2 IMDSv2 Mandatory"
      LoggingLevel:
        default: "Logging Level"

Parameters:
  EbsDefaultEncryption:
    AllowedValues: ["true", "false"]
    Default: "true"
    Description: "EC2 enable EBS Default Encryption."
    Type: String
  EbsDefaultEncryptionKeyAdministratorArn:
    Type: String
    Description: ARN of IAM user/role that will administer the KMS key
  EbsDefaultEncryptionKeyAliasName:
    Type: String
    Default: alias/ebs-default-encryption
    Description: Alias name for the KMS key (prefix with 'alias/', cannot use 'alias/aws' which is reserved for AWS managed keys)
  EbsDefaultEncryptionKeyKeyDescription:
    Type: String
    Default: KMS key for EBS volume default encryption
    Description: Description for the KMS key
  EnableKeyRotation:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Enable automatic key rotation (recommended)  
  EC2IMDSv2Mandatory:
    AllowedValues: ["true", "false"]
    Default: "true"
    Description: "EC2 enable IMDSv2 as mandatory."
    Type: String
  BlockPublicAccessEBSSnapshots:
    AllowedValues: ["block-all-sharing", "block-new-sharing"]
    Default: "block-all-sharing"
    Description: "EC2 enable EBS Snapshots Block Public Access."
    Type: String      
  LoggingLevel:
    AllowedValues: ["CRITICAL", "DEBUG", "ERROR", "INFO", "WARNING"]
    Default: "INFO"
    Description: "The logging level for the Lambda function."
    Type: String
  PasswordPolicyMinLength:
    Type: Number
    Default: 20
    MinValue: 6
    MaxValue: 128
    Description: "Minimum length of the password (between 6 and 128 characters)"
  PasswordPolicyMaxAge:
    Type: Number
    Default: 90
    MinValue: 1
    MaxValue: 1095
    Description: "Number of days before the password expires (between 1 and 1095 days)"
  PasswordPolicyRequireUppercase:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: "Require at least one uppercase letter in the password"
  PasswordPolicyRequireLowercase:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: "Require at least one lowercase letter in the password"
  PasswordPolicyRequireNumbers:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: "Require at least one number in the password"
  PasswordPolicyRequireSymbols:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: "Require at least one non-alphanumeric character in the password"

Resources:
  EbsDefaultEncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Ref EbsDefaultEncryptionKeyKeyDescription
      EnableKeyRotation: !Ref EnableKeyRotation
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: kms:*
            Resource: '*'
          - Sid: Allow Key Administrator
            Effect: Allow
            Principal:
              AWS: !Ref EbsDefaultEncryptionKeyAdministratorArn
            Action:
              - kms:Create*
              - kms:Describe*
              - kms:Enable*
              - kms:List*
              - kms:Put*
              - kms:Update*
              - kms:Revoke*
              - kms:Disable*
              - kms:Get*
              - kms:Delete*
              - kms:TagResource
              - kms:UntagResource
              - kms:ScheduleKeyDeletion
              - kms:CancelKeyDeletion
            Resource: '*'
          - Sid: Allow EBS Service
            Effect: Allow
            Principal:
              AWS: '*'
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:CreateGrant
              - kms:ListGrants
              - kms:DescribeKey
            Resource: '*'
            Condition:
              StringEquals:
                kms:ViaService: !Sub 'ec2.${AWS::Region}.amazonaws.com'
                kms:CallerAccount: !Ref 'AWS::AccountId'
      Tags:
        - Key: Purpose
          Value: EBS Default Encryption
        - Key: Service
          Value: EBS

  EbsDefaultEncryptionKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Ref EbsDefaultEncryptionKeyAliasName
      TargetKeyId: !Ref EbsDefaultEncryptionKey

  LambdaExecutionRole:
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: "sts:AssumeRole"
      Description: "Used by the Lambda to update the EC2 Data Protection and Security configuration and IAM password policy."
      Policies:
        - PolicyName: LambdaExecutionPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - "logs:CreateLogGroup"
                  - "logs:CreateLogStream"
                  - "logs:PutLogEvents"
                Resource: "arn:aws:logs:*:*:*"
              - Effect: Allow
                Action:
                  - "ec2:GetEbsEncryptionByDefault"
                  - "ec2:EnableEbsEncryptionByDefault"
                  - "ec2:GetEbsDefaultKmsKeyId"
                  - "ec2:DisableEbsEncryptionByDefault"
                  - "ec2:ResetEbsDefaultKmsKeyId"
                  - "ec2:ModifyEbsDefaultKmsKeyId"
                  - "ec2:EnableSnapshotBlockPublicAccess"
                  - "ec2:DisableSnapshotBlockPublicAccess"
                  - "ec2:ModifyInstanceMetadataDefaults"
                  - "sts:GetCallerIdentity"
                  - "iam:UpdateAccountPasswordPolicy"
                Resource: "*"
      RoleName: "ec2-data-protection-security-update-lambda"

  EC2DataProtectionSecurityUpdateLambda:
    Type: "AWS::Lambda::Function"
    Properties:
      Architectures:
        - x86_64
      Code:
        ZipFile: |
          import os
          import logging
          import boto3
          from botocore.exceptions import ClientError
          import cfnresponse
          logger = logging.getLogger()
          logger.setLevel(os.environ['LOGGING_LEVEL'])
          ec2_client = boto3.client("ec2")
          sts_client = boto3.client('sts')
          account_id = sts_client.get_caller_identity()["Account"]
          def lambda_handler(event, context):
              logger.info(f"Received event: {event}")
              physical_id = event['LogicalResourceId']
              try:
                  if event['RequestType'] in ['Create', 'Update']:
                      set_ebs_default_encryption(event['ResourceProperties'])
                      if event['ResourceProperties']['EC2IMDSv2Mandatory'] == 'true':
                          set_imdsv2_mandatory(event['ResourceProperties'])
                      elif event['ResourceProperties']['EC2IMDSv2Mandatory'] == 'false':
                          reset_imdsv2_mandatory()
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {}, physical_id)
                  elif event['RequestType'] == 'Delete':
                      reset_ebs_default_encryption()
                      reset_imdsv2_mandatory()
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {}, physical_id)
                  else:
                      logger.error(f"Invalid request type: {event['RequestType']}")
                      cfnresponse.send(event, context, cfnresponse.FAILED, {}, physical_id)
              except Exception as e:
                  logger.error(f"Error: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {}, physical_id)
          def set_ebs_default_encryption(properties):
              try:
                  ebskmskeyid = properties['EbsDefaultEncryptionKMSKeyAlias'].lower()
                  ec2_client.enable_ebs_encryption_by_default()
                  ec2_client.modify_ebs_default_kms_key_id(KmsKeyId=ebskmskeyid)
                  logger.info("EC2 Data Protection and Security updated successfully")
              except ClientError as e:
                  logger.error(f"Error updating EC2 Data Protection and Security configuration: {str(e)}")
                  raise
          def reset_ebs_default_encryption():
              try:
                  ec2_client.reset_ebs_default_kms_key_id()
                  logger.info("EC2 Data Protection and Security EBS Default Encryption reset successfully")
              except ClientError as e:
                  if e.response['Error']['Code'] == 'NoSuchPublicAccessBlockConfiguration':
                      logger.info("EC2 Data Protection and Security was already deleted or did not exist")
                  else:
                      logger.error(f"Error resetting EC2 Data Protection and Security configuration: {str(e)}")
                      raise
          def set_imdsv2_mandatory(properties):
              try:
                  ec2_client.modify_instance_metadata_defaults(HttpTokens='Required',HttpPutResponseHopLimit=1,HttpEndpoint='enabled',InstanceMetadataTags='enabled')
                  logger.info("EC2 Data Protection and Security IMDSv2 updated successfully")
              except ClientError as e:
                  logger.error(f"Error updating EC2 Data Protection and Security IMDSv2 configuration: {str(e)}")
                  raise
          def reset_imdsv2_mandatory():
              try:
                  ec2_client.modify_instance_metadata_defaults(HttpTokens='optional',HttpPutResponseHopLimit=-1,HttpEndpoint='no-preference',InstanceMetadataTags='no-preference')
                  logger.info("EC2 Data Protection and Security IMDSv2 reset successfully")
              except ClientError as e:
                  logger.error(f"Error resetting EC2 Data Protection and Security IMDSv2 configuration: {str(e)}")
                  raise
      Description: "Updates and deletes the account-level EC2 Data Protection and Security configuration at account level in a region."
      Environment:
        Variables:
          LOGGING_LEVEL: !Ref LoggingLevel
      FunctionName: "ec2-data-protection-security-update"
      Handler: index.lambda_handler
      LoggingConfig:
        LogGroup: !Ref EC2DataProtectionSecurityUpdateLambdaLogGroup
      MemorySize: 128
      PackageType: Zip
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.13
      Timeout: 60

  EC2DataProtectionSecurityUpdateLambdaLogGroup:
    Type: "AWS::Logs::LogGroup"
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      RetentionInDays: 14

  EC2DataProtectionSecurity:
    Type: "Custom::EC2DataProtectionSecurity"
    Properties:
      EbsDefaultEncryption: !Ref EbsDefaultEncryption
      EbsDefaultEncryptionKMSKeyAlias: !Ref EbsDefaultEncryptionKeyAliasName
      EC2IMDSv2Mandatory: !Ref EC2IMDSv2Mandatory
      ServiceToken: !GetAtt EC2DataProtectionSecurityUpdateLambda.Arn

  EC2BlockPublicAccessEBSSnapshots:
    Type: "AWS::EC2::SnapshotBlockPublicAccess"
    Properties:
      State: !Ref BlockPublicAccessEBSSnapshots

  SetPasswordPolicyLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub "/aws/lambda/SetPasswordPolicyLambda"
      RetentionInDays: 14

  SetPasswordPolicyLambda:
    Type: AWS::Lambda::Function
    DependsOn: SetPasswordPolicyLambdaLogGroup
    Properties:
      Runtime: python3.13
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import logging

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          def lambda_handler(event, context):
              logger.info(f"Received event: {event}")
              iam = boto3.client('iam')
              
              try:
                  if event['RequestType'] in ['Create', 'Update']:
                      logger.info("Updating account password policy")
                      iam.update_account_password_policy(
                          MinimumPasswordLength=int(event['ResourceProperties']['MinimumPasswordLength']),
                          RequireSymbols=event['ResourceProperties']['RequireSymbols'] == 'true',
                          RequireNumbers=event['ResourceProperties']['RequireNumbers'] == 'true',
                          RequireUppercaseCharacters=event['ResourceProperties']['RequireUppercaseCharacters'] == 'true',
                          RequireLowercaseCharacters=event['ResourceProperties']['RequireLowercaseCharacters'] == 'true',
                          MaxPasswordAge=int(event['ResourceProperties']['MaxPasswordAge'])
                      )
                      logger.info("Successfully updated account password policy")
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                  elif event['RequestType'] == 'Delete':
                      logger.info("Delete request received. No action taken on password policy.")
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  logger.error(f"Error updating password policy: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {})

  CustomPasswordPolicy:
    Type: Custom::SetPasswordPolicy
    DependsOn: SetPasswordPolicyLambda
    Properties:
      ServiceToken: !GetAtt SetPasswordPolicyLambda.Arn
      MinimumPasswordLength: !Ref PasswordPolicyMinLength
      RequireSymbols: !Ref PasswordPolicyRequireSymbols
      RequireNumbers: !Ref PasswordPolicyRequireNumbers
      RequireUppercaseCharacters: !Ref PasswordPolicyRequireUppercase
      RequireLowercaseCharacters: !Ref PasswordPolicyRequireLowercase
      MaxPasswordAge: !Ref PasswordPolicyMaxAge

Outputs:
  EbsDefaultEncryptionKMSKeyId:
    Description: ID of the created KMS key
    Value: !Ref EbsDefaultEncryptionKey

  EbsDefaultEncryptionKMSKeyArn:
    Description: ARN of the created KMS key
    Value: !GetAtt EbsDefaultEncryptionKey.Arn

  EbsDefaultEncryptionKMSKeyAlias:
    Description: Alias of the created KMS key
    Value: !Ref EbsDefaultEncryptionKeyAliasName
