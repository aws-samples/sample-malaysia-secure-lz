AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template to create EventBridge rule for GuardDuty CRITICAL/HIGH severity findings - Deploy in Audit/Security Account'

Parameters:
  EmailAddresses:
    Type: String
    Description: 'Comma-delimited list of email addresses to subscribe to the SNS topic'

Resources:
  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns: []
      Policies:
        - PolicyName: EventBridgeSNSPublish
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref SNSTopic

  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: guardduty-severity-alerts
      KmsMasterKeyId: alias/aws/sns

  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SNSTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowEventBridgePublish
            Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sns:Publish
            Resource: !Ref SNSTopic

  EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: guardduty-severity-alerts
      Description: 'EventBridge rule to monitor GuardDuty findings with CRITICAL/HIGH severity'
      State: ENABLED
      EventPattern: 
        source: 
          - aws.securityhub
        detail-type: 
          - Security Hub Findings - Imported
        detail:
          findings:
            ProductArn:
              - arn:aws:securityhub:ap-southeast-1::product/aws/guardduty
              - arn:aws:securityhub:ap-southeast-1::product/aws/securityhub
              - arn:aws:securityhub:ap-southeast-5::product/aws/guardduty
              - arn:aws:securityhub:ap-southeast-5::product/aws/securityhub
            Severity:
              Label:
                - CRITICAL
                - HIGH
      Targets:
        - Arn: !Ref SNSTopic
          Id: GuardDutySeverityAlerts
          RoleArn: !GetAtt EventBridgeRole.Arn
          InputTransformer:
            InputPathsMap:
              severity: "$.detail.findings[0].Severity.Label"
              title: "$.detail.findings[0].Title"
              description: "$.detail.findings[0].Description"
              account: "$.detail.findings[0].AwsAccountId"
              region: "$.detail.findings[0].Region"
              resourceType: "$.detail.findings[0].Resources[0].Type"
              resourceId: "$.detail.findings[0].Resources[0].Id"
              createdAt: "$.detail.findings[0].CreatedAt"
              recommendation: "$.detail.findings[0].Remediation.Recommendation.Text"
              remediationUrl: "$.detail.findings[0].Remediation.Recommendation.Url"
            InputTemplate: >-
              {"Subject": "[<severity>] Security Finding: <title>", "Message": "AWS GuardDuty Security Finding\n\n--- FINDING DETAILS ---\nSeverity: <severity>\nDescription: <description>\n\n--- AFFECTED RESOURCE ---\nAccount: <account>\nRegion: <region>\nResource Type: <resourceType>\nResource ID: <resourceId>\nDetection Time: <createdAt>\n\n--- REMEDIATION ---\nAction Required: <recommendation>\n\nRemediation Steps: <remediationUrl>\n\n--- \nAWS GuardDuty Alert System"}

  SNSSubscriptionFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: index.handler
      Role: !GetAtt SNSSubscriptionFunctionRole.Arn
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import os

          def handler(event, context):
              try:
                  if event['RequestType'] in ['Create', 'Update']:
                      sns = boto3.client('sns')
                      topic_arn = event['ResourceProperties']['TopicArn']
                      emails = event['ResourceProperties']['Emails'].split(',')
                      
                      # Clean and validate emails
                      emails = [email.strip() for email in emails if email.strip()]
                      
                      # Subscribe each email
                      for email in emails:
                          sns.subscribe(
                              TopicArn=topic_arn,
                              Protocol='email',
                              Endpoint=email
                          )
                      
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {
                          'Message': f'Successfully subscribed {len(emails)} email(s)'
                      })
                  elif event['RequestType'] == 'Delete':
                      # Subscriptions are automatically deleted with the topic
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {
                          'Message': 'Subscriptions will be deleted with topic'
                      })
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {
                      'Error': str(e)
                  })
      Runtime: python3.9
      Timeout: 300
      MemorySize: 128

  SNSSubscriptionFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SNSSubscriptionManagement
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sns:Subscribe
                Resource: !Ref SNSTopic

  SNSSubscriptions:
    Type: Custom::SNSSubscriptions
    Properties:
      ServiceToken: !GetAtt SNSSubscriptionFunction.Arn
      TopicArn: !Ref SNSTopic
      Emails: !Ref EmailAddresses

Outputs:
  SNSTopicArn:
    Description: ARN of the SNS Topic for GuardDuty alerts
    Value: !Ref SNSTopic
  EventBridgeRuleArn:
    Description: ARN of the EventBridge Rule
    Value: !GetAtt EventBridgeRule.Arn
  SubscribedEmails:
    Description: Email addresses subscribed to the SNS topic
    Value: !Ref EmailAddresses
